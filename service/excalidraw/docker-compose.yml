name: excalidraw

services:
  excalidraw:
    image: excalidraw/excalidraw:latest

    container_name: excalidraw

    ports:
      - ${EXCALIDRAW_PORT}:80

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

