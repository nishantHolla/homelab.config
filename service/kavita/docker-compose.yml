name: kavita

services:
  kavita:
    image: jvmilazz0/kavita:latest

    container_name: kavita

    ports:
      - ${KAVITA_PORT}:5000

    volumes:
      - ${HOMELAB_DATA_DIR}/apps/kavita:/kavita/config
      - ${HOMELAB_DATA_DIR}/library/comics:/comics
      - ${HOMELAB_DATA_DIR}/library/books:/books
      - ${HOMELAB_DATA_DIR}/library/manga:/manga

    environment:
      TZ: ${TZ}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
