name: immich

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}

    container_name: immich_server

    ports:
      - ${IMMICH_PORT}:2283/tcp

    volumes:
      - ${HOMELAB_DATA_DIR}/immich/library:/data
      - /etc/localtime:/etc/localtime:ro

    environment:
      TZ: ${TZ}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_USERNAME: ${IMMICH_DB_USERNAME}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE_NAME}

    depends_on:
      - redis
      - database

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2283/api/server-info/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63

    container_name: immich_redis

    environment:
      TZ: ${TZ}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23

    container_name: immich_postgres

    volumes:
      - ${HOMELAB_DATA_DIR}/immich/pgdata:/var/lib/postgresql/data

    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD} ## defined in secret/immich.yaml
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: 'HDD'

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IMMICH_DB_USERNAME} -d ${IMMICH_DB_DATABASE_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

