name: stirling

services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest

    container_name: stirling

    ports:
      - ${STIRLING_PORT}:8080

    volumes:
      - ${HOMELAB_DATA_DIR}/stirling/data:/configs

    environment:
      TZ: ${TZ}

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped
