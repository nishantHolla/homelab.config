name: vaultwarden

services:
  vaultwarden:
    image: vaultwarden/server:latest

    container_name: vaultwarden

    ports:
      - "${VAULTWARDEN_PORT}:80"

    volumes:
      - ${HOMELAB_DATA_DIR}/apps/vaultwarden/data:/data

    environment:
      TZ: ${TZ}
      UMASK: 0022
      DOMAIN: "https://vw.domain.tld"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
