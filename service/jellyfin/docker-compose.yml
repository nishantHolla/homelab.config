name: jellyfin

services:
  jellyfin:
    image: jellyfin/jellyfin:latest

    container_name: jellyfin

    user: "${HOMELAB_UID}:${HOMELAB_GID}"

    ports:
      - ${JELLYFIN_TCP_PORT}:8096/tcp
      - ${JELLYFIN_UDP_PORT}:7359/udp

    volumes:
      - ${HOMELAB_DATA_DIR}/jellyfin/config:/config
      - ${HOMELAB_DATA_DIR}/jellyfin/cache:/cache
      - ${HOMELAB_DATA_DIR}/jellyfin/media:/media:ro

    environment:
      TZ: ${TZ}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
