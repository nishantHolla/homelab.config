name: jellyfin

services:
  jellyfin:
    image: jellyfin/jellyfin:latest

    container_name: jellyfin

    ports:
      - ${TCP_PORT}:8096/tcp
      - ${UDP_PORT}:7359/udp

    volumes:
      - ${HOMELAB_DATA_DIR}/jellyfin/config:/config
      - ${HOMELAB_DATA_DIR}/jellyfin/cache:/cache
      - type: bind
        source: ${HOMELAB_DATA_DIR}/jellyfin/media
        target: /media
      - type: bind
        source: ${HOMELAB_DATA_DIR}/jellyfin/media2
        target: /media2
        read_only: true

    env_file:
        - .env

    restart: unless-stopped

    healthcheck:
      disable: false


