name: adguardhome

services:
  adguardhome:
    image: adguard/adguardhome

    container_name: adguard

    ports:
      - 53:53/tcp
      - 53:53/udp
      - ${ADGUARD_PORT}:80/tcp
      - ${ADGUARD_ADMIN_PORT}:3000/tcp

    volumes:
      - ${HOMELAB_DATA_DIR}/adguard/conf:/opt/adguardhome/conf
      - ${HOMELAB_DATA_DIR}/adguard/work

    environment:
      TZ: ${TZ}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
