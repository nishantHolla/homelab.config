name: navidrome

services:
  navidrome:
    image: deluan/navidrome:latest

    container_name: navidrome

    user: "${HOMELAB_UID}:${HOMELAB_GID}"

    ports:
      - ${NAVIDROME_PORT}:4533

    volumes:
      - ${HOMELAB_DATA_DIR}/navidrome/data:/data
      - ${HOMELAB_DATA_DIR}/navidrome/music:/music:ro

    environment:
      TZ: ${TZ}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4533/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
